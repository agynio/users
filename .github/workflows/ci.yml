name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GOTOOLCHAIN: local

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Install buf
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          version: 1.66.0

      - name: Generate protobuf bindings
        run: buf generate --path agynio/api/users/v1

      - name: Run tests
        run: go test ./...

      - name: Build
        run: go build ./...
